name: publish

# Trigger: push a tag matching v*.*.* (e.g. v1.0.4) to release ALL four
# publish-target packages with their current versions in pyproject.toml.
#
# Audit C14: standardised PyPI publishing workflow.
#
# Setup before first use:
#   1. Create a PyPI account + API token at https://pypi.org/manage/account/token/
#   2. Add the token as repository secret PYPI_API_TOKEN
#   3. (Optional) test.pypi.org token as TEST_PYPI_API_TOKEN
#
# To release:
#   git tag v1.0.4 && git push origin v1.0.4

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to upload (testpypi or pypi)"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build all four packages
        run: bash scripts/release.sh build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dists
          path: dist/

  publish-test:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dists
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  publish-pypi:
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dists
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
